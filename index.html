<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIRO DEVICES – Digital Signage</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;500;600;700&display=swap');

  :root {
    --navy: #1a1fa8;
    --navy-dark: #10147a;
    --navy-light: #2830d0;
    --gold: #f5a800;
    --gold-light: #ffc93c;
    --gold-dark: #c88500;
    --white: #ffffff;
    --off-white: #f0f4ff;
    --bg: #0a0d5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    transform-origin: top left;
  }

  /* ─── BACKGROUND ─────────────────────────────────── */
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 800px 600px at 50% 20%, rgba(26,31,168,0.6) 0%, transparent 70%),
                radial-gradient(ellipse 600px 400px at 80% 80%, rgba(245,168,0,0.12) 0%, transparent 60%);
  }

  /* ─── LAYOUT ─────────────────────────────────────── */
  #app {

    width: 1080px; height: 1920px;
    display: flex; flex-direction: column;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  .header {
    height: 280px;
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-light) 100%);
    border-bottom: 4px solid var(--gold);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .header::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .logo-wrap {
    display: flex; align-items: center; gap: 20px;
  }
  .logo-img {
    height: 250px; width: auto;
    filter: drop-shadow(0 0 12px rgba(245,168,0,0.4));

  .logo-fallback {
    display: flex; flex-direction: column;
  }
  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 50px; font-weight: 700;
    color: var(--white);
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(245,168,0,0.3);
  }
  .brand-name span { color: var(--gold); }
  .brand-tagline {
    font-size: 50px; font-weight: 300;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-right {
    text-align: right;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(245,168,0,0.15);
    border: 1px solid rgba(245,168,0,0.4);
    border-radius: 20px;
    padding: 6px 16px;
    margin-bottom: 8px;
  }
  .live-dot {
    width: 25px; height: 25px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(245,168,0,0.7); }
    50% { opacity: 0.8; transform: scale(1.15); box-shadow: 0 0 0 6px rgba(245,168,0,0); }
  }
  .live-text { font-size: 25px; font-weight: 600; color: var(--gold); letter-spacing: 2px; }
  .location {
    font-size: 30px; color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }



  /* ─── MAIN CONTENT ───────────────────────────────── */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }

  /* ─── PRODUCT SLIDE ──────────────────────────────── */
  .product-slide {
    flex: 1;

    flex-direction: column;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;

  .product-slide.visible {

  .slide-inner {

  /* Product Image */
  .product-image-wrap {
    height: 580px; flex-shrink: 0;

    border: 1px solid rgba(245,168,0,0.2);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .product-image-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(245,168,0,0.05) 0%, transparent 70%);
  }
  .product-img {
    max-height: 560px; max-width: 100%;

  .condition-refurbished { color: #ff9800; }

  /* Price */

  }
  .price-label {
    font-size: 20px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .price-original {
    font-family: 'Rajdhani', sans-serif;
    font-size: 55px; font-weight: 600;

  .counter-dot.active {

    background: white;

  .wa-qr-box canvas, .wa-qr-box img { width: 180px !important; height: 180px !important; }
  .wa-qr-label {
    font-size: 18px; font-weight: 700;
    color: #25D366; letter-spacing: 1px;
    text-transform: uppercase;
  }

  .footer-divider {
    width: 2px; height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(245,168,0,0.4), transparent);
    flex-shrink: 0;
  }

  .footer-contact {
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }
  .contact-row {
    display: flex; align-items: center; gap: 10px;
  }
  .contact-icon { width: 45px; height: 45px; color: var(--gold); flex-shrink: 0; }
  .contact-text {
    font-size: 30px; font-weight: 500;
    color: var(--white); letter-spacing: 0.5px;
  }
  .contact-text.phone {
    font-size: 50px;
  }
  .contact-text span { color: var(--gold); font-weight: 700; }

  .footer-location {
    text-align: right;
    flex-shrink: 0;
  }
  .location-icon { color: var(--gold); font-size: 22px; }
  .location-name {
    font-size: 25px; font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    line-height: 1.5;
  }
  .location-name strong { color: var(--gold); display: block; font-size: 18px; }

  /* ─── LOADING / ERROR ────────────────────────────── */
  .status-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    transition: opacity 0.5s;
  }
  .status-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 60px; height: 60px;
    border: 4px solid rgba(245,168,0,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg {
    font-size: 30px; color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }
  .error-icon { font-size: 48px; }
  .retry-countdown {
    font-size: 14px; color: var(--gold);
    letter-spacing: 1px;
  }

</style>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNGyz8ztitTlhMi4xvfOPvlqF4CMhWEfNH1jeM5R2QO3KgN-exnwyMXcdjVp7Mtya5/exec';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRBgmm7um1FHVT4MXt3ip-_D3qRel7jmkEtDD3xI0wikg9Jr07r5eUayZb5YRIHxfn4jw_V8yUSjkma/pub?output=csv';

const SLIDE_INTERVAL   = 20000;
const REFRESH_INTERVAL = 60000;
const WATCHDOG_TIMEOUT = 90000;
const MAX_RETRIES = 5;
const RETRY_BASE = 4000;

const WA_NUMBER = '94756754168';

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let products      = [];
let currentSlide  = 0;
let slideTimer    = null;
let refreshTimer  = null;
let watchdogTimer = null;
let retryCount    = 0;
let lastActivity  = Date.now();
let isRunning     = false;

// ═══════════════════════════════════════════════════
//  WATCHDOG
// ═══════════════════════════════════════════════════
function resetWatchdog() {
  lastActivity = Date.now();
  clearTimeout(watchdogTimer);
  watchdogTimer = setTimeout(() => {
    console.warn('[WATCHDOG] App hung – reloading…');
    location.reload();
  }, WATCHDOG_TIMEOUT);
}

// ═══════════════════════════════════════════════════
//  CSV PARSER  (handles quoted fields with commas)
// ═══════════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else cur += ch;
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

function csvToProducts(rows) {
  if (!rows.length) return [];
  // Hard skip: always skip first 3 rows (title, contact, header)
  // then find first row where column C (index 2) is a number (the price)
  let dataStart = 3;
  for (let i = 3; i < Math.min(rows.length, 10); i++) {
    const price = (rows[i][2] || '').toString().trim();
    if (price.length > 0 && !isNaN(parseFloat(price.replace(/[^0-9.]/g, '')))) {
      dataStart = i;
      break;
    }
  }
  const data = rows.slice(dataStart);
  return data
    .filter(r => r[0])
    .map(r => ({
      name:         r[0]  || '',
      category:     r[1]  || 'Laptop',
      price:        r[2]  || '',
      condition:    r[3]  || '',
      processor:    r[4]  || '',
      ram:          r[5]  || '',
      storage:      r[6]  || '',
      display:      r[7]  || '',
      graphicsCard: r[8]  || '',
      os:           r[9]  || '',
      imageUrl:     r[10] || '',
      promoText:      r[11] || '',
      discountPrice:  r[12] || ''
    }));
}

// ═══════════════════════════════════════════════════
//  FETCH WITH RETRY + BACKOFF
// ═══════════════════════════════════════════════════
async function fetchData() {
  const bust = '&t=' + Date.now();
  let lastErr;

  // ── Strategy 1: Google Apps Script relay (most reliable) ─────────
  const appsScriptSet = APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
  if (appsScriptSet) {
    try {
      const url = APPS_SCRIPT_URL + '?t=' + Date.now();
      console.log('[FETCH] Trying Apps Script relay…');
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.data && json.data.length) {
        console.log('[FETCH] Apps Script OK, products:', json.data.length);
        console.log('[FETCH] First product raw:', JSON.stringify(json.data[0]));
        retryCount = 0;
        // Normalize field name: handle both 'discountedPrice' and 'discountPrice'
        return json.data.map(p => ({
          ...p,
          discountPrice: p.discountedPrice || p.discountPrice || ''
        }));
      }
      throw new Error('Empty data from Apps Script');
    } catch (err) {
      console.warn('[FETCH] Apps Script failed:', err.message);
      lastErr = err;
    }
  }

  // ── Strategy 2: Direct CSV fetch ──────────────────────────────────
  try {
    console.log('[FETCH] Trying direct CSV fetch…');
    const res = await fetch(CSV_URL + bust, { cache: 'no-store', mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Got HTML not CSV');
    const rows = parseCSV(text);
    const parsed = csvToProducts(rows);
    if (parsed.length) {
      console.log('[FETCH] Direct CSV OK, products:', parsed.length);
      retryCount = 0;
      return parsed;
    }
    throw new Error('0 products parsed');
  } catch (err) {
    console.warn('[FETCH] Direct failed:', err.message);
    lastErr = err;
  }

  // ── Strategy 3: no-cors fetch via hidden iframe proxy ─────────────
  try {
    console.log('[FETCH] Trying iframe CSV fallback…');
    const parsed = await fetchCsvViaIframe(CSV_URL + bust);
    if (parsed.length) {
      console.log('[FETCH] Iframe CSV OK, products:', parsed.length);
      retryCount = 0;
      return parsed;
    }
    throw new Error('0 products via iframe');
  } catch (err) {
    console.warn('[FETCH] Iframe failed:', err.message);
    lastErr = err;
  }

  throw lastErr || new Error('All fetch strategies failed');
}

// Fetches CSV by injecting a temporary iframe — works around file:// CORS
function fetchCsvViaIframe(url) {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => reject(new Error('iframe timeout')), 12000);
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = url;
    iframe.onload = () => {
      try {
        const text = iframe.contentDocument?.body?.innerText || iframe.contentWindow?.document?.body?.innerText;
        clearTimeout(timeout);
        document.body.removeChild(iframe);
        if (!text) throw new Error('no content');
        const rows = parseCSV(text);
        resolve(csvToProducts(rows));
      } catch(e) {
        clearTimeout(timeout);
        try { document.body.removeChild(iframe); } catch(_) {}
        reject(e);
      }
    };
    iframe.onerror = () => {
      clearTimeout(timeout);
      try { document.body.removeChild(iframe); } catch(_) {}
      reject(new Error('iframe load error'));
    };
    document.body.appendChild(iframe);
  });
}

async function loadWithRetry() {
  for (let i = 0; i <= MAX_RETRIES; i++) {
    try {
      showLoading(i > 0 ? `RETRYING (${i}/${MAX_RETRIES})…` : 'LOADING PRODUCTS…');
      const data = await fetchData();
      return data;
    } catch(e) {
      if (i === MAX_RETRIES) throw e;
      const delay = RETRY_BASE * Math.pow(2, i);
      await countdown(delay, `RETRY IN`);
    }
  }
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function showLoading(msg) {
  document.getElementById('statusOverlay').classList.remove('hidden');
  document.getElementById('spinnerEl').style.display = 'block';
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('retryCountdown').style.display = 'none';
  document.getElementById('app').style.display = 'none';
}

function showError(msg) {
  document.getElementById('statusOverlay').classList.remove('hidden');
  document.getElementById('spinnerEl').style.display = 'none';
  document.getElementById('statusMsg').textContent = msg;
}

function hideLoading() {
  document.getElementById('statusOverlay').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
}

function countdown(ms, prefix) {
  return new Promise(resolve => {
    const el = document.getElementById('retryCountdown');
    el.style.display = 'block';
    let rem = Math.ceil(ms / 1000);
    el.textContent = `${prefix} ${rem}s…`;
    const t = setInterval(() => {
      rem--;
      if (rem <= 0) { clearInterval(t); resolve(); }
      else el.textContent = `${prefix} ${rem}s…`;
    }, 1000);
  });
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function getConditionClass(cond) {
  if (!cond) return '';
  const c = cond.toLowerCase();
  if (c.includes('new')) return 'condition-new';
  if (c.includes('refurb')) return 'condition-refurbished';
  return 'condition-used';
}

function formatPrice(price) {
  const num = parseFloat(price.toString().replace(/[^0-9.]/g, ''));
  if (isNaN(num)) return price;
  return num.toLocaleString('en-LK');
}

function generateWaQr() {
  const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("Hi ZIRO DEVICES! I'd like to enquire about a product.")}`;
  new QRCode(document.getElementById('waQrCode'), {
    text: waLink,
    width: 180,
    height: 180,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
}





function buildDots() {
  const ctr = document.getElementById('slideCounter');
  const max = Math.min(products.length, 12);
  ctr.innerHTML = Array.from({length: max}, (_, i) =>
    `<div class="counter-dot${i === currentSlide ? ' active' : ''}"></div>`
  ).join('');
}

function renderSlide(index) {
  const p = products[index];
  if (!p) return;

  const main = document.getElementById('mainContent');
  const condClass = getConditionClass(p.condition);

  const specsData = [
    { label: 'Processor',     value: p.processor },
    { label: 'RAM',           value: p.ram },
    { label: 'Storage',       value: p.storage },
    { label: 'Display',       value: p.display },
    { label: 'Graphics Card', value: p.graphicsCard },
    { label: 'OS',            value: p.os },
  ].filter(s => s.value);

  const specsHTML = specsData.map(s => `
    <div class="spec-item">
      <span class="spec-label">${s.label}</span>
      <span class="spec-value">${s.value}</span>
    </div>`
  ).join('');

  const imgHTML = p.imageUrl
    ? `<img class="product-img" src="${p.imageUrl}" alt="${p.name}"
            onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1\\'><rect x=\\'2\\' y=\\'3\\' width=\\'20\\' height=\\'14\\' rx=\\'2\\'/><path d=\\'M8 21h8M12 17v4\\'/></svg><span>IMAGE UNAVAILABLE</span></div>'">`
    : `<div class="img-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <span>NO IMAGE</span>
      </div>`;

  main.innerHTML = `
    <div class="product-slide visible">
      <div class="slide-inner">
        <div class="product-image-wrap">${imgHTML}</div>

        <div class="product-header">
          <div class="product-name-wrap">
            ${p.category ? `<div class="product-category-badge">${p.category}</div>` : ''}
            <div class="product-name">${p.name}</div>
            ${p.condition ? `<div class="product-condition ${condClass}">
              <div class="condition-dot"></div>${p.condition}
            </div>` : ''}
          </div>
          <div class="price-box">
            <div class="price-label">Price (LKR)</div>
            ${p.discountPrice ? `
              <div class="price-original">
                <span class="price-currency">Rs.</span>${formatPrice(p.price)}
              </div>
              <div class="price-value">
                <span class="price-currency">Rs.</span>${formatPrice(p.discountPrice)}
              </div>
              <div class="price-save-badge">
                SAVE Rs.${formatPrice((parseFloat(p.price.toString().replace(/[^0-9.]/g,'')) - parseFloat(p.discountPrice.toString().replace(/[^0-9.]/g,''))).toString())}
              </div>
            ` : `
              <div class="price-value">
                <span class="price-currency">Rs.</span>${formatPrice(p.price)}
              </div>
            `}
          </div>
        </div>

        <div class="specs-grid">${specsHTML}</div>

        ${p.promoText ? `<div class="promo-banner">
          <span class="promo-icon">🔥</span>
          <span class="promo-text">${p.promoText}</span>
        </div>` : ''}
      </div>
    </div>`;

  buildDots();
  resetWatchdog();
}

// ═══════════════════════════════════════════════════
//  SLIDE SHOW
// ═══════════════════════════════════════════════════
function nextSlide() {
  currentSlide = (currentSlide + 1) % products.length;
  renderSlide(currentSlide);
  resetWatchdog();
}

function startSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
  renderSlide(currentSlide);
  slideTimer = setInterval(nextSlide, SLIDE_INTERVAL);
}

// ═══════════════════════════════════════════════════
//  AUTO REFRESH
// ═══════════════════════════════════════════════════
async function silentRefresh() {
  try {
    const fresh = await fetchData();
    if (fresh.length) {
      products = fresh;
      // don't reset currentSlide – continuity
    }
  } catch(e) {
    console.warn('[REFRESH]', e.message);
    // keep showing existing data
  }
  resetWatchdog();
}

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(silentRefresh, REFRESH_INTERVAL);
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
async function boot() {
  resetWatchdog();
  generateWaQr();

  try {
    products = await loadWithRetry();
    hideLoading();
    currentSlide = 0;
    startSlideshow();
    scheduleRefresh();
    isRunning = true;
  } catch(err) {
    showError('⚠️ FAILED TO LOAD PRODUCTS – RELOADING…');
    setTimeout(() => location.reload(), 10000);
  }
}

// ─── Visibility API: re-sync when tab becomes visible ───
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isRunning) {
    silentRefresh();
    resetWatchdog();
  }
});

// ─── Auto-scale to fill any screen ──────────────────────────────
function scaleToScreen() {
  const DESIGN_W = 1080;
  const DESIGN_H = 1920;
  const scaleX = window.innerWidth  / DESIGN_W;
  const scaleY = window.innerHeight / DESIGN_H;
  const scale  = Math.min(scaleX, scaleY);
  document.body.style.transform = `scale(${scale})`;
  const offsetX = (window.innerWidth  - DESIGN_W * scale) / 2;
  const offsetY = (window.innerHeight - DESIGN_H * scale) / 2;
  document.body.style.marginLeft = offsetX + 'px';
  document.body.style.marginTop  = offsetY + 'px';
}
window.addEventListener('resize', scaleToScreen);
scaleToScreen();

// ─── Start ───────────────────────────────────────────────
window.addEventListener('load', boot);
</script>
