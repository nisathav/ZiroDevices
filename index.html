<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920, initial-scale=1.0">
<style>
  html { zoom: 1; transform-origin: top left; }
</style>
<title>ZIRO DEVICES – Digital Signage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;500;600;700&display=swap');

  :root {
    --navy: #1a1fa8;
    --navy-dark: #10147a;
    --navy-light: #2830d0;
    --gold: #f5a800;
    --gold-light: #ffc93c;
    --gold-dark: #c88500;
    --white: #ffffff;
    --off-white: #f0f4ff;
    --bg: #0a0d5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
  }

  /* ─── BACKGROUND ─────────────────────────────────── */
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(245,168,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,168,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 800px 600px at 50% 20%, rgba(26,31,168,0.6) 0%, transparent 70%),
                radial-gradient(ellipse 600px 400px at 80% 80%, rgba(245,168,0,0.12) 0%, transparent 60%);
  }

  /* ─── LAYOUT ─────────────────────────────────────── */
  #app {
    position: relative; z-index: 1;
    width: 1080px; height: 1920px;
    display: flex; flex-direction: column;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  .header {
    height: 160px;
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 50%, var(--navy-light) 100%);
    border-bottom: 4px solid var(--gold);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .header::after {
    content: '';
    position: absolute; bottom: -4px; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
  }
  .logo-wrap {
    display: flex; align-items: center; gap: 20px;
  }
  .logo-img {
    height: 90px; width: auto;
    filter: drop-shadow(0 0 12px rgba(245,168,0,0.4));
  }
  .logo-fallback {
    display: flex; flex-direction: column;
  }
  .brand-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px; font-weight: 700;
    color: var(--white);
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(245,168,0,0.3);
  }
  .brand-name span { color: var(--gold); }
  .brand-tagline {
    font-size: 16px; font-weight: 300;
    color: rgba(255,255,255,0.7);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-right {
    text-align: right;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(245,168,0,0.15);
    border: 1px solid rgba(245,168,0,0.4);
    border-radius: 20px;
    padding: 6px 16px;
    margin-bottom: 8px;
  }
  .live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(245,168,0,0.7); }
    50% { opacity: 0.8; transform: scale(1.15); box-shadow: 0 0 0 6px rgba(245,168,0,0); }
  }
  .live-text { font-size: 13px; font-weight: 600; color: var(--gold); letter-spacing: 2px; }
  .location {
    font-size: 14px; color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  /* ─── CATEGORY STRIP ─────────────────────────────── */
  .category-strip {
    height: 56px; flex-shrink: 0;
    background: linear-gradient(90deg, var(--navy-dark), var(--navy));
    border-bottom: 2px solid rgba(245,168,0,0.3);
    display: flex; align-items: center; justify-content: center;
    gap: 0;
    overflow: hidden;
  }
  .cat-tab {
    padding: 0 32px;
    font-size: 15px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    border-right: 1px solid rgba(255,255,255,0.1);
    height: 100%; display: flex; align-items: center;
    transition: all 0.4s;
  }
  .cat-tab.active {
    color: var(--gold);
    background: rgba(245,168,0,0.08);
    border-bottom: 3px solid var(--gold);
  }

  /* ─── MAIN CONTENT ───────────────────────────────── */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0;
  }

  /* ─── PRODUCT SLIDE ──────────────────────────────── */
  .product-slide {
    flex: 1;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    padding: 28px 40px 20px;
    position: absolute;
    top: 216px; /* header + strip */
    left: 0; right: 0;
    bottom: 180px; /* ticker + footer */
  }
  .product-slide.visible {
    opacity: 1; transform: translateY(0);
    position: relative; top: auto; bottom: auto;
    flex: 1;
  }

  .slide-inner {
    display: flex; flex-direction: column;
    height: 100%; gap: 24px;
  }

  /* Product Image */
  .product-image-wrap {
    height: 420px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.07));
    border: 1px solid rgba(245,168,0,0.2);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .product-image-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(245,168,0,0.05) 0%, transparent 70%);
  }
  .product-img {
    max-height: 400px; max-width: 100%;
    object-fit: contain;
    filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
    position: relative; z-index: 1;
    transition: transform 0.3s ease;
  }
  .img-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    color: rgba(255,255,255,0.2);
  }
  .img-placeholder svg { width: 80px; height: 80px; }
  .img-placeholder span { font-size: 14px; letter-spacing: 2px; }

  /* Product Header */
  .product-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 20px;
  }
  .product-name-wrap { flex: 1; }
  .product-category-badge {
    display: inline-block;
    background: rgba(245,168,0,0.15);
    border: 1px solid rgba(245,168,0,0.4);
    color: var(--gold);
    font-size: 12px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 4px;
    margin-bottom: 10px;
  }
  .product-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 42px; font-weight: 700;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: 1px;
  }
  .product-condition {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 8px;
    font-size: 13px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase;
  }
  .condition-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .condition-new .condition-dot { background: #00e676; }
  .condition-refurbished .condition-dot { background: #ff9800; }
  .condition-used .condition-dot { background: #f44336; }
  .condition-new { color: #00e676; }
  .condition-refurbished { color: #ff9800; }
  .condition-used { color: #f44336; }

  /* Price */
  .price-box {
    text-align: right; flex-shrink: 0;
  }
  .price-label {
    font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.5); margin-bottom: 4px;
  }
  .price-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 54px; font-weight: 700;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 30px rgba(245,168,0,0.4);
  }
  .price-currency {
    font-size: 24px; font-weight: 600;
    vertical-align: super; color: var(--gold-light);
  }

  /* Specs Grid */
  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    flex: 1;
  }
  .spec-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 3px solid rgba(245,168,0,0.5);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .spec-label {
    font-size: 11px; font-weight: 600;
    color: rgba(245,168,0,0.7);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .spec-value {
    font-size: 16px; font-weight: 500;
    color: var(--white);
    line-height: 1.3;
  }

  /* Promo Banner */
  .promo-banner {
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
    border-radius: 12px;
    padding: 16px 28px;
    display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .promo-icon { font-size: 28px; flex-shrink: 0; }
  .promo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px; font-weight: 700;
    color: var(--navy-dark);
    letter-spacing: 1px;
    line-height: 1.2;
  }

  /* ─── SLIDE COUNTER ──────────────────────────────── */
  .slide-counter {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    padding: 6px 0 2px;
    flex-shrink: 0;
  }
  .counter-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .counter-dot.active {
    background: var(--gold);
    transform: scale(1.4);
    box-shadow: 0 0 6px rgba(245,168,0,0.6);
  }

  /* ─── TICKER ─────────────────────────────────────── */
  .ticker-wrap {
    height: 52px; flex-shrink: 0;
    background: var(--gold);
    overflow: hidden;
    display: flex; align-items: center;
    position: relative;
    border-top: 2px solid var(--gold-dark);
    border-bottom: 2px solid var(--gold-dark);
  }
  .ticker-label {
    background: var(--navy-dark);
    color: var(--gold);
    font-size: 14px; font-weight: 800;
    letter-spacing: 3px; text-transform: uppercase;
    padding: 0 24px;
    height: 100%; display: flex; align-items: center;
    white-space: nowrap;
    flex-shrink: 0;
    z-index: 2;
    border-right: 3px solid var(--gold-dark);
  }
  .ticker-track {
    flex: 1; overflow: hidden;
  }
  .ticker-inner {
    display: flex; align-items: center;
    white-space: nowrap;
    animation: ticker-scroll 28s linear infinite;
  }
  .ticker-item {
    font-size: 16px; font-weight: 700;
    color: var(--navy-dark);
    padding: 0 48px;
    letter-spacing: 1px;
  }
  .ticker-sep {
    color: var(--navy-dark);
    font-size: 20px; opacity: 0.4;
  }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ─── FOOTER ─────────────────────────────────────── */
  .footer {
    height: 120px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--navy-dark) 0%, #0e1260 100%);
    border-top: 3px solid rgba(245,168,0,0.5);
    display: flex; align-items: center;
    padding: 0 40px;
    gap: 24px;
  }
  .wa-btn {
    background: #25D366;
    border-radius: 14px;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
    text-decoration: none;
  }
  .wa-btn svg { width: 28px; height: 28px; fill: white; }
  .wa-btn-text {
    display: flex; flex-direction: column;
  }
  .wa-btn-label {
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,0.8); letter-spacing: 2px; text-transform: uppercase;
  }
  .wa-btn-action {
    font-size: 18px; font-weight: 700; color: white;
  }

  .footer-divider {
    width: 2px; height: 70px;
    background: linear-gradient(to bottom, transparent, rgba(245,168,0,0.4), transparent);
    flex-shrink: 0;
  }

  .footer-contact {
    flex: 1;
    display: flex; flex-direction: column; gap: 10px;
  }
  .contact-row {
    display: flex; align-items: center; gap: 10px;
  }
  .contact-icon { width: 20px; height: 20px; color: var(--gold); flex-shrink: 0; }
  .contact-text {
    font-size: 17px; font-weight: 500;
    color: var(--white); letter-spacing: 0.5px;
  }
  .contact-text span { color: var(--gold); font-weight: 700; }

  .footer-location {
    text-align: right;
    flex-shrink: 0;
  }
  .location-icon { color: var(--gold); font-size: 22px; }
  .location-name {
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    line-height: 1.5;
  }
  .location-name strong { color: var(--gold); display: block; font-size: 18px; }

  /* ─── LOADING / ERROR ────────────────────────────── */
  .status-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
    transition: opacity 0.5s;
  }
  .status-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 60px; height: 60px;
    border: 4px solid rgba(245,168,0,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg {
    font-size: 18px; color: rgba(255,255,255,0.6);
    letter-spacing: 2px;
  }
  .error-icon { font-size: 48px; }
  .retry-countdown {
    font-size: 14px; color: var(--gold);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
// ── STEP 1: Paste your Google Apps Script Web App URL below ──────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxOUPeVnkyylO_ID3pyg-scmxEyAAWY-MSZZSC0GiIOB89_1qToJC_mUBP8Op1a50WV/exec';
// ─────────────────────────────────────────────────────────────────

// Fallback direct CSV (used if Apps Script URL not set yet)
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT79zJqeHJfDGaXW2-KlZW9Qo-cSbYKOjoP3XqHUP9eHlZoJcUADUiunkU0pWZKV8auZELg7B-EFZ1Y/pub?output=csv';

const SLIDE_INTERVAL   = 6000;
const REFRESH_INTERVAL = 60000;
const WATCHDOG_TIMEOUT = 90000;
const MAX_RETRIES = 5;
const RETRY_BASE = 4000;

const WA_NUMBER = '94756754168';

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let products      = [];
let currentSlide  = 0;
let slideTimer    = null;
let refreshTimer  = null;
let watchdogTimer = null;
let retryCount    = 0;
let lastActivity  = Date.now();
let isRunning     = false;

// ═══════════════════════════════════════════════════
//  WATCHDOG
// ═══════════════════════════════════════════════════
function resetWatchdog() {
  lastActivity = Date.now();
  clearTimeout(watchdogTimer);
  watchdogTimer = setTimeout(() => {
    console.warn('[WATCHDOG] App hung – reloading…');
    location.reload();
  }, WATCHDOG_TIMEOUT);
}

// ═══════════════════════════════════════════════════
//  CSV PARSER  (handles quoted fields with commas)
// ═══════════════════════════════════════════════════
function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else cur += ch;
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

function csvToProducts(rows) {
  if (!rows.length) return [];
  const data = rows[0][0].toLowerCase().includes('product') ? rows.slice(1) : rows;
  return data
    .filter(r => r[0])
    .map(r => ({
      name:      r[0]  || '',
      category:  r[1]  || 'Laptop',
      price:     r[2]  || '',
      condition: r[3]  || '',
      processor: r[4]  || '',
      ram:       r[5]  || '',
      storage:   r[6]  || '',
      display:   r[7]  || '',
      battery:   r[8]  || '',
      os:        r[9]  || '',
      imageUrl:  r[10] || '',
      promoText: r[11] || 'Ask about our special deals & warranty packages!'
    }));
}

// ═══════════════════════════════════════════════════
//  FETCH WITH RETRY + BACKOFF
// ═══════════════════════════════════════════════════
async function fetchData() {
  const bust = '&t=' + Date.now();
  let lastErr;

  // ── Strategy 1: Google Apps Script relay (most reliable) ─────────
  const appsScriptSet = APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
  if (appsScriptSet) {
    try {
      const url = APPS_SCRIPT_URL + '?t=' + Date.now();
      console.log('[FETCH] Trying Apps Script relay…');
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (json.data && json.data.length) {
        console.log('[FETCH] Apps Script OK, products:', json.data.length);
        retryCount = 0;
        return json.data;
      }
      throw new Error('Empty data from Apps Script');
    } catch (err) {
      console.warn('[FETCH] Apps Script failed:', err.message);
      lastErr = err;
    }
  }

  // ── Strategy 2: Direct fetch (works on GitHub Pages + published sheet) ──
  try {
    console.log('[FETCH] Trying direct CSV fetch…');
    const res = await fetch(CSV_URL + bust, { cache: 'no-store', mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if (text.trim().startsWith('<')) throw new Error('Got HTML not CSV');
    const rows = parseCSV(text);
    const parsed = csvToProducts(rows);
    if (parsed.length) {
      console.log('[FETCH] Direct CSV OK, products:', parsed.length);
      retryCount = 0;
      return parsed;
    }
    throw new Error('0 products parsed');
  } catch (err) {
    console.warn('[FETCH] Direct failed:', err.message);
    lastErr = err;
  }

  throw lastErr || new Error('All fetch strategies failed');
}

async function loadWithRetry() {
  for (let i = 0; i <= MAX_RETRIES; i++) {
    try {
      showLoading(i > 0 ? `RETRYING (${i}/${MAX_RETRIES})…` : 'LOADING PRODUCTS…');
      const data = await fetchData();
      return data;
    } catch(e) {
      if (i === MAX_RETRIES) throw e;
      const delay = RETRY_BASE * Math.pow(2, i);
      await countdown(delay, `RETRY IN`);
    }
  }
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function showLoading(msg) {
  document.getElementById('statusOverlay').classList.remove('hidden');
  document.getElementById('spinnerEl').style.display = 'block';
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('retryCountdown').style.display = 'none';
  document.getElementById('app').style.display = 'none';
}

function showError(msg) {
  document.getElementById('statusOverlay').classList.remove('hidden');
  document.getElementById('spinnerEl').style.display = 'none';
  document.getElementById('statusMsg').textContent = msg;
}

function hideLoading() {
  document.getElementById('statusOverlay').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
}

function countdown(ms, prefix) {
  return new Promise(resolve => {
    const el = document.getElementById('retryCountdown');
    el.style.display = 'block';
    let rem = Math.ceil(ms / 1000);
    el.textContent = `${prefix} ${rem}s…`;
    const t = setInterval(() => {
      rem--;
      if (rem <= 0) { clearInterval(t); resolve(); }
      else el.textContent = `${prefix} ${rem}s…`;
    }, 1000);
  });
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function getConditionClass(cond) {
  if (!cond) return '';
  const c = cond.toLowerCase();
  if (c.includes('new')) return 'condition-new';
  if (c.includes('refurb')) return 'condition-refurbished';
  return 'condition-used';
}

function formatPrice(price) {
  const num = parseFloat(price.toString().replace(/[^0-9.]/g, ''));
  if (isNaN(num)) return price;
  return num.toLocaleString('en-LK');
}

function buildTickerContent() {
  const items = [
    '📞 075 675 4168',
    '📞 076 556 1881',
    '📍 Kinniya, Trincomalee, Sri Lanka',
    '💬 Order via WhatsApp anytime!',
    '🛡️ All products come with warranty',
    '💻 Quality laptops at unbeatable prices',
    '⭐ Visit ZIRO DEVICES today!',
    '🔧 Sales · Repairs · Accessories',
  ];
  const doubled = [...items, ...items];
  const inner = document.getElementById('tickerInner');
  inner.innerHTML = doubled.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-sep">•</span>`
  ).join('');
}

function buildCategoryStrip() {
  const cats = [...new Set(products.map(p => p.category).filter(Boolean))].slice(0, 5);
  const strip = document.getElementById('categoryStrip');
  const activeCat = products[currentSlide]?.category || '';
  strip.innerHTML = cats.map(c =>
    `<div class="cat-tab${c === activeCat ? ' active' : ''}">${c}</div>`
  ).join('');
}

function buildDots() {
  const ctr = document.getElementById('slideCounter');
  const max = Math.min(products.length, 12);
  ctr.innerHTML = Array.from({length: max}, (_, i) =>
    `<div class="counter-dot${i === currentSlide ? ' active' : ''}"></div>`
  ).join('');
}

function renderSlide(index) {
  const p = products[index];
  if (!p) return;

  const main = document.getElementById('mainContent');
  const condClass = getConditionClass(p.condition);

  const specsData = [
    { label: 'Processor', value: p.processor },
    { label: 'RAM',       value: p.ram },
    { label: 'Storage',   value: p.storage },
    { label: 'Display',   value: p.display },
    { label: 'Battery',   value: p.battery },
    { label: 'OS',        value: p.os },
  ].filter(s => s.value);

  const specsHTML = specsData.map(s => `
    <div class="spec-item">
      <span class="spec-label">${s.label}</span>
      <span class="spec-value">${s.value}</span>
    </div>`
  ).join('');

  const imgHTML = p.imageUrl
    ? `<img class="product-img" src="${p.imageUrl}" alt="${p.name}"
            onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1\\'><rect x=\\'2\\' y=\\'3\\' width=\\'20\\' height=\\'14\\' rx=\\'2\\'/><path d=\\'M8 21h8M12 17v4\\'/></svg><span>IMAGE UNAVAILABLE</span></div>'">`
    : `<div class="img-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <span>NO IMAGE</span>
      </div>`;

  // Build WhatsApp order link
  const waMsg = encodeURIComponent(`Hi ZIRO DEVICES! I'm interested in: ${p.name} (${p.price ? 'LKR ' + formatPrice(p.price) : ''}). Please share more details.`);
  document.querySelector('.wa-btn').href = `https://wa.me/${WA_NUMBER}?text=${waMsg}`;

  main.innerHTML = `
    <div class="product-slide visible">
      <div class="slide-inner">
        <div class="product-image-wrap">${imgHTML}</div>

        <div class="product-header">
          <div class="product-name-wrap">
            ${p.category ? `<div class="product-category-badge">${p.category}</div>` : ''}
            <div class="product-name">${p.name}</div>
            ${p.condition ? `<div class="product-condition ${condClass}">
              <div class="condition-dot"></div>${p.condition}
            </div>` : ''}
          </div>
          <div class="price-box">
            <div class="price-label">Price (LKR)</div>
            <div class="price-value">
              <span class="price-currency">Rs.</span>${formatPrice(p.price)}
            </div>
          </div>
        </div>

        <div class="specs-grid">${specsHTML}</div>

        ${p.promoText ? `<div class="promo-banner">
          <span class="promo-icon">🔥</span>
          <span class="promo-text">${p.promoText}</span>
        </div>` : ''}
      </div>
    </div>`;

  buildDots();
  buildCategoryStrip();
  resetWatchdog();
}

// ═══════════════════════════════════════════════════
//  SLIDE SHOW
// ═══════════════════════════════════════════════════
function nextSlide() {
  currentSlide = (currentSlide + 1) % products.length;
  renderSlide(currentSlide);
  resetWatchdog();
}

function startSlideshow() {
  if (slideTimer) clearInterval(slideTimer);
  renderSlide(currentSlide);
  slideTimer = setInterval(nextSlide, SLIDE_INTERVAL);
}

// ═══════════════════════════════════════════════════
//  AUTO REFRESH
// ═══════════════════════════════════════════════════
async function silentRefresh() {
  try {
    const fresh = await fetchData();
    if (fresh.length) {
      products = fresh;
      // don't reset currentSlide – continuity
    }
  } catch(e) {
    console.warn('[REFRESH]', e.message);
    // keep showing existing data
  }
  resetWatchdog();
}

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(silentRefresh, REFRESH_INTERVAL);
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
async function boot() {
  resetWatchdog();
  buildTickerContent();

  try {
    products = await loadWithRetry();
    hideLoading();
    currentSlide = 0;
    startSlideshow();
    scheduleRefresh();
    isRunning = true;
  } catch(err) {
    showError('⚠️ FAILED TO LOAD PRODUCTS – RELOADING…');
    setTimeout(() => location.reload(), 10000);
  }
}

// ─── Visibility API: re-sync when tab becomes visible ───
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isRunning) {
    silentRefresh();
    resetWatchdog();
  }
});

// ─── Start ───────────────────────────────────────────────
window.addEventListener('load', boot);
(function() {
    function fitScreen() {
      const scaleX = window.screen.width  / 1080;
      const scaleY = window.screen.height / 1920;
      const scale  = Math.min(scaleX, scaleY);
      document.documentElement.style.transform = 'scale(' + scale + ')';
      document.documentElement.style.transformOrigin = 'top left';
      document.documentElement.style.width  = '1080px';
      document.documentElement.style.height = '1920px';
    }
    fitScreen();
    window.addEventListener('resize', fitScreen);
  })();
</script>
