<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ZIRO DEVICES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@400;500;600;700;800&display=swap');

/* ─── RESET & BASE ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#060a4a;font-family:'Exo 2',sans-serif}

/* ─── SCALE ROOT ─────────────────────────────────────────────── */
/* Fixed 1080×1920 canvas — JS scales it to fit any TV */
#R{
  position:fixed;top:0;left:0;
  width:1080px;height:1920px;
  transform-origin:top left;
  overflow:hidden;
  background:#060a4a;
}

/* ─── BACKGROUND ─────────────────────────────────────────────── */
#R::before{
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 1000px 800px at 50% 0%,   rgba(26,31,168,.6) 0%,transparent 65%),
    radial-gradient(ellipse  600px 400px at 90% 100%,  rgba(245,168,0,.08) 0%,transparent 60%);
}
.grid{
  position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(245,168,0,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(245,168,0,.035) 1px,transparent 1px);
  background-size:60px 60px;
}

/* ─── APP SHELL ──────────────────────────────────────────────── */
#app{
  position:relative;z-index:1;
  width:1080px;height:1920px;
  display:flex;flex-direction:column;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER  — 210px, bold, readable from 5m away
═══════════════════════════════════════════════════════════════ */
.hdr{
  height:210px;flex-shrink:0;
  background:linear-gradient(135deg,#0b0f6a 0%,#1a1fa8 55%,#2830d0 100%);
  border-bottom:6px solid #f5a800;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;
  box-shadow:0 12px 48px rgba(0,0,0,.7);
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:-6px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#ffc93c,transparent);
}
/* Logo */
.logo-wrap{display:flex;align-items:center;gap:20px}
.logo-img{height:140px;width:auto;filter:drop-shadow(0 0 20px rgba(245,168,0,.55))}
.logo-fb{display:none;flex-direction:column}
.brand{font-family:'Rajdhani',sans-serif;font-size:70px;font-weight:700;color:#fff;letter-spacing:4px;line-height:1;text-shadow:0 0 28px rgba(245,168,0,.35)}
.brand b{color:#f5a800}
.sub{font-size:21px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:5px;text-transform:uppercase;margin-top:4px}
/* Right side */
.hdr-r{text-align:right}
.live{display:inline-flex;align-items:center;gap:10px;background:rgba(245,168,0,.15);border:2px solid rgba(245,168,0,.55);border-radius:40px;padding:10px 26px;margin-bottom:12px}
.dot{width:16px;height:16px;border-radius:50%;background:#f5a800;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,168,0,.7)}50%{box-shadow:0 0 0 10px rgba(245,168,0,0)}}
.live-txt{font-size:20px;font-weight:800;color:#f5a800;letter-spacing:3px}
.hdr-loc{font-size:20px;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:1px}

/* ═══════════════════════════════════════════════════════════════
   CATEGORY STRIP — 72px
═══════════════════════════════════════════════════════════════ */
.cats{
  height:72px;flex-shrink:0;
  background:linear-gradient(90deg,#0b0f6a,#1a1fa8);
  border-bottom:3px solid rgba(245,168,0,.3);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.cat{
  padding:0 40px;height:100%;
  display:flex;align-items:center;
  font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.38);
  border-right:1px solid rgba(255,255,255,.08);
}
.cat.on{color:#f5a800;background:rgba(245,168,0,.09);border-bottom:5px solid #f5a800}

/* ═══════════════════════════════════════════════════════════════
   MAIN — grows to fill remaining space
═══════════════════════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ─── SLIDE ──────────────────────────────────────────────────── */
.slide{flex:1;display:flex;flex-direction:column;opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
.slide.on{opacity:1;transform:translateY(0)}
.slide-in{display:flex;flex-direction:column;height:100%}

/* ─── PRODUCT IMAGE — 580px, dominant ───────────────────────── */
.img-box{
  height:580px;flex-shrink:0;
  background:linear-gradient(170deg,rgba(255,255,255,.04),rgba(255,255,255,.10));
  border-bottom:3px solid rgba(245,168,0,.2);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.img-box::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 65%,rgba(245,168,0,.08) 0%,transparent 60%);
}
.prod-img{max-height:555px;max-width:97%;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 28px 56px rgba(0,0,0,.65))}
.no-img{display:flex;flex-direction:column;align-items:center;gap:18px;color:rgba(255,255,255,.15)}
.no-img svg{width:110px;height:110px}
.no-img span{font-size:19px;letter-spacing:4px;text-transform:uppercase}

/* ─── PRODUCT INFO BLOCK ─────────────────────────────────────── */
.info{flex:1;display:flex;flex-direction:column;padding:24px 52px 18px;gap:16px}

/* Name row */
.badge{
  display:inline-block;
  background:rgba(245,168,0,.14);border:1.5px solid rgba(245,168,0,.5);
  color:#f5a800;font-size:18px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  padding:5px 20px;border-radius:6px;margin-bottom:10px;
}
.pname{font-family:'Rajdhani',sans-serif;font-size:58px;font-weight:700;color:#fff;line-height:1.05;letter-spacing:1px}
.cond{display:inline-flex;align-items:center;gap:9px;margin-top:8px;font-size:19px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.cond-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.new  .cond-dot{background:#00e676} .new{color:#00e676}
.refurb .cond-dot{background:#ff9800} .refurb{color:#ff9800}
.used .cond-dot{background:#f44336} .used{color:#f44336}

/* ─── PRICE — the hero element ───────────────────────────────── */
.price-box{
  flex-shrink:0;
  background:linear-gradient(130deg,rgba(245,168,0,.15),rgba(245,168,0,.04));
  border:2.5px solid rgba(245,168,0,.45);
  border-radius:20px;
  padding:18px 36px;
  display:flex;align-items:center;justify-content:space-between;
}
.p-left{}
.p-lbl{font-size:18px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:0}
.p-val{
  font-family:'Rajdhani',sans-serif;
  font-size:104px;font-weight:700;color:#f5a800;line-height:.95;letter-spacing:-2px;
  text-shadow:0 0 50px rgba(245,168,0,.55),0 0 100px rgba(245,168,0,.2);
}
.p-cur{font-size:40px;font-weight:600;vertical-align:super;color:#ffc93c;letter-spacing:0}
.p-right{text-align:right}
.p-avail{font-size:16px;letter-spacing:2px;color:rgba(255,255,255,.38);text-transform:uppercase;margin-bottom:10px}
.p-badge{
  display:inline-block;
  background:#f5a800;color:#0b0f6a;
  font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  padding:10px 26px;border-radius:12px;
  box-shadow:0 4px 20px rgba(245,168,0,.4);
}

/* ─── SPECS — compact inline rows ───────────────────────────── */
.specs{
  flex-shrink:0;
  border:1px solid rgba(255,255,255,.09);
  border-radius:16px;overflow:hidden;
}
.srow{
  display:flex;align-items:center;
  padding:14px 30px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.srow:last-child{border-bottom:none}
.srow:nth-child(odd) {background:rgba(255,255,255,.03)}
.srow:nth-child(even){background:rgba(255,255,255,.065)}
.sico{font-size:24px;width:44px;text-align:center;flex-shrink:0}
.slbl{font-size:19px;font-weight:700;color:#f5a800;letter-spacing:2px;text-transform:uppercase;width:210px;flex-shrink:0;margin-left:10px}
.ssep{color:rgba(245,168,0,.3);font-size:22px;margin:0 22px;flex-shrink:0}
.sval{font-size:22px;font-weight:600;color:#fff;flex:1;line-height:1.2}

/* ─── PROMO BANNER ───────────────────────────────────────────── */
.promo{
  flex-shrink:0;
  background:linear-gradient(90deg,#c88500,#f5a800,#ffc93c,#f5a800,#c88500);
  background-size:300% 100%;
  animation:shimmer 2.2s linear infinite;
  border-radius:18px;
  padding:26px 40px;
  display:flex;align-items:center;justify-content:center;gap:22px;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:300%}}
.p-ico{font-size:44px;flex-shrink:0;animation:bop .85s ease-in-out infinite alternate}
@keyframes bop{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.3) rotate(4deg)}}
.p-txt{
  font-family:'Rajdhani',sans-serif;
  font-size:38px;font-weight:700;
  color:#0b0f6a;text-align:center;letter-spacing:1px;line-height:1.15;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
}

/* ═══════════════════════════════════════════════════════════════
   SLIDE DOTS
═══════════════════════════════════════════════════════════════ */
.dots{display:flex;justify-content:center;align-items:center;gap:12px;padding:10px 0;flex-shrink:0}
.dot2{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
.dot2.on{background:#f5a800;transform:scale(1.6);box-shadow:0 0 10px rgba(245,168,0,.7)}

/* ═══════════════════════════════════════════════════════════════
   TICKER — 70px gold bar
═══════════════════════════════════════════════════════════════ */
.ticker{
  height:70px;flex-shrink:0;
  background:#f5a800;
  border-top:4px solid #c88500;border-bottom:4px solid #c88500;
  display:flex;align-items:center;overflow:hidden;
}
.t-lbl{
  background:#0b0f6a;color:#f5a800;
  font-size:20px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  padding:0 32px;height:100%;display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;border-right:4px solid #c88500;
}
.t-track{flex:1;overflow:hidden}
.t-inner{display:flex;align-items:center;white-space:nowrap;animation:scroll 25s linear infinite}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{font-size:22px;font-weight:700;color:#0b0f6a;padding:0 56px;letter-spacing:1px}
.t-sep{color:#0b0f6a;font-size:24px;opacity:.3}

/* ═══════════════════════════════════════════════════════════════
   FOOTER — 176px, large text, clearly readable
═══════════════════════════════════════════════════════════════ */
.footer{
  height:176px;flex-shrink:0;
  background:linear-gradient(135deg,#0b0f6a 0%,#0e1475 100%);
  border-top:5px solid rgba(245,168,0,.65);
  display:flex;align-items:center;
  padding:0 52px;gap:32px;
}
/* WhatsApp button */
.wa{
  background:#25D366;border-radius:18px;
  padding:20px 30px;
  display:flex;align-items:center;gap:18px;
  flex-shrink:0;text-decoration:none;
  box-shadow:0 8px 30px rgba(37,211,102,.45);
}
.wa svg{width:44px;height:44px;fill:#fff}
.wa-t{display:flex;flex-direction:column;gap:2px}
.wa-l{font-size:15px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:2px;text-transform:uppercase}
.wa-a{font-size:28px;font-weight:900;color:#fff}
/* Divider */
.fdiv{width:2px;height:110px;background:linear-gradient(to bottom,transparent,rgba(245,168,0,.55),transparent);flex-shrink:0}
/* Contact info */
.fcon{flex:1;display:flex;flex-direction:column;gap:16px}
.crow{display:flex;align-items:center;gap:16px}
.fico{width:30px;height:30px;color:#f5a800;flex-shrink:0}
.ftxt{font-size:25px;font-weight:600;color:#fff;letter-spacing:.5px}
.ftxt b{color:#f5a800;font-weight:900}
/* Location */
.floc{text-align:right;flex-shrink:0}
.floc-n{font-size:21px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:1px;line-height:1.65}
.floc-n strong{color:#f5a800;display:block;font-size:25px;font-weight:800}

/* ═══════════════════════════════════════════════════════════════
   LOADING OVERLAY
═══════════════════════════════════════════════════════════════ */
#ov{
  position:absolute;inset:0;z-index:999;background:#060a4a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;
  transition:opacity .5s;
}
#ov.off{opacity:0;pointer-events:none}
.spin{width:80px;height:80px;border:6px solid rgba(245,168,0,.2);border-top-color:#f5a800;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#omsg{font-size:24px;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase}
#ocd{font-size:20px;color:#f5a800;letter-spacing:2px;display:none}
</style>
</head>

  <div id="app" style="display:none">

    <div class="hdr">

  </div><!-- #app -->
</div><!-- #R -->

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════
var AS   = 'https://script.google.com/macros/s/AKfycbxOUPeVnkyylO_ID3pyg-scmxEyAAWY-MSZZSC0GiIOB89_1qToJC_mUBP8Op1a50WV/exec';
var WA   = '94756754168';
var TICK = 7500;   // ms per slide
var REF  = 60000;  // data refresh interval
var WD   = 95000;  // watchdog timeout
var MAXR = 5;      // max retries
var RBASE= 4000;   // retry base delay

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
var prods=[], cur=0, stimer=null, wtimer=null, running=false;

// ════════════════════════════════════════════════════════════
//  AUTO-SCALE  (learned: use Math.min of both axes)
// ════════════════════════════════════════════════════════════
function fit(){
  var R=document.getElementById('R');
  var sw=window.innerWidth, sh=window.innerHeight;
  var s=Math.min(sw/1080, sh/1920);
  R.style.transform='scale('+s+')';
  R.style.left=Math.max(0,(sw-1080*s)/2)+'px';
  R.style.top =Math.max(0,(sh-1920*s)/2)+'px';
}
fit();
window.addEventListener('resize',fit);

// ════════════════════════════════════════════════════════════
//  WATCHDOG
// ════════════════════════════════════════════════════════════
function resetWD(){
  clearTimeout(wtimer);
  wtimer=setTimeout(function(){location.reload();},WD);
}

// ════════════════════════════════════════════════════════════
//  FETCH — JSONP only (fetch() blocked by Yodeck)
//  Learned: script-tag injection bypasses Yodeck network block
// ════════════════════════════════════════════════════════════
function fetchData(){
  return new Promise(function(ok,fail){
    // clean up any previous attempt
    var old=document.getElementById('_js');
    if(old) old.parentNode.removeChild(old);

    var cb='_zc'+Date.now();
    var tid=setTimeout(function(){
      delete window[cb];
      fail(new Error('timeout'));
    },18000);

    window[cb]=function(res){
      clearTimeout(tid);
      delete window[cb];
      var s=document.getElementById('_js');
      if(s) s.parentNode.removeChild(s);
      if(res&&res.data&&res.data.length) ok(res.data);
      else fail(new Error('empty'));
    };

    var s=document.createElement('script');
    s.id='_js';
    s.src=AS+'?callback='+cb+'&t='+Date.now();
    s.onerror=function(){
      clearTimeout(tid);
      delete window[cb];
      fail(new Error('load error'));
    };
    document.head.appendChild(s);
  });
}

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
function fmtPrice(p){
  var n=parseFloat(String(p).replace(/[^0-9.]/g,''));
  return isNaN(n)?p:n.toLocaleString('en-LK');
}
function ccls(c){
  if(!c) return '';
  var l=c.toLowerCase();
  return l.includes('new')?'new':l.includes('refurb')?'refurb':'used';
}

// ════════════════════════════════════════════════════════════
//  LOADING UI
// ════════════════════════════════════════════════════════════
function showLoad(msg){
  var ov=document.getElementById('ov');
  ov.classList.remove('off');
  document.getElementById('omsg').textContent=msg;
  document.getElementById('ocd').style.display='none';
  document.getElementById('app').style.display='none';
}
function hideLoad(){
  document.getElementById('ov').classList.add('off');
  document.getElementById('app').style.display='flex';
  fit();
}
function startCD(ms){
  return new Promise(function(res){
    var el=document.getElementById('ocd');
    el.style.display='block';
    var r=Math.ceil(ms/1000);
    el.textContent='RETRY IN '+r+'s';
    var t=setInterval(function(){
      r--;
      el.textContent='RETRY IN '+r+'s';
      if(r<=0){clearInterval(t);res();}
    },1000);
  });
}

// ════════════════════════════════════════════════════════════
//  RENDER SLIDE
// ════════════════════════════════════════════════════════════
var ICO={Processor:'⚙️',RAM:'💾',Storage:'💿',Display:'🖥️',Battery:'🔋',OS:'💻'};

function renderSlide(i){
  var p=prods[i]; if(!p) return;
  var cc=ccls(p.condition);

  // Specs rows (only non-empty)
  var specs=[
    {l:'Processor',v:p.processor},
    {l:'RAM',v:p.ram},
    {l:'Storage',v:p.storage},
    {l:'Display',v:p.display},
    {l:'Battery',v:p.battery},
    {l:'OS',v:p.os}
  ].filter(function(s){return s.v&&s.v.trim();});

  var sh=specs.map(function(s){
    return '<div class="srow">'+
      '<span class="sico">'+(ICO[s.l]||'▸')+'</span>'+
      '<span class="slbl">'+s.l+'</span>'+
      '<span class="ssep">|</span>'+
      '<span class="sval">'+s.v+'</span>'+
    '</div>';
  }).join('');

  // Image
  var ih=p.imageUrl&&p.imageUrl.trim()
    ?'<img class="prod-img" src="'+p.imageUrl+'" alt="'+p.name+'" '+
      'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div class="no-img" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span>NO IMAGE</span></div>'
    :'<div class="no-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span>NO IMAGE</span></div>';

  // WhatsApp link
  var wm=encodeURIComponent('Hi ZIRO DEVICES! I\'m interested in: '+p.name+(p.price?' (LKR '+fmtPrice(p.price)+')':'')+'. Please share more details.');
  document.getElementById('waBtn').href='https://wa.me/'+WA+'?text='+wm;

  document.getElementById('main').innerHTML=
    '<div class="slide on"><div class="slide-in">'+

    // Image
    '<div class="img-box">'+ih+'</div>'+

    // Info
    '<div class="info">'+

      // Name block
      '<div>'+
        (p.category?'<div class="badge">'+p.category+'</div><br>':'')+
        '<div class="pname">'+p.name+'</div>'+
        (p.condition?'<div class="cond '+cc+'"><div class="cond-dot"></div>'+p.condition+'</div>':'')+
      '</div>'+

      // Price
      '<div class="price-box">'+
        '<div class="p-left">'+
          '<div class="p-lbl">Selling Price</div>'+
          '<div class="p-val"><span class="p-cur">Rs.</span>'+fmtPrice(p.price)+'</div>'+
        '</div>'+
        '<div class="p-right">'+
          '<div class="p-avail">Available Now</div>'+
          '<div class="p-badge">✅ IN STOCK</div>'+
        '</div>'+
      '</div>'+

      // Specs
      (sh?'<div class="specs">'+sh+'</div>':'')+

      // Promo
      (p.promoText?
        '<div class="promo">'+
          '<span class="p-ico">🔥</span>'+
          '<span class="p-txt">'+p.promoText+'</span>'+
          '<span class="p-ico">🔥</span>'+
        '</div>':'')+

    '</div>'+ // .info
    '</div></div>'; // .slide-in .slide

  buildDots();
  buildCats();
  resetWD();
}

// ════════════════════════════════════════════════════════════
//  CATEGORY STRIP & DOTS
// ════════════════════════════════════════════════════════════
function buildCats(){
  var seen={},list=[];
  prods.forEach(function(p){if(p.category&&!seen[p.category]){seen[p.category]=1;list.push(p.category);}});
  list=list.slice(0,5);
  var ac=prods[cur]?prods[cur].category:'';
  document.getElementById('cats').innerHTML=list.map(function(c){
    return '<div class="cat'+(c===ac?' on':'')+'">'+(c.length>10?c.slice(0,10)+'…':c)+'</div>';
  }).join('');
}
function buildDots(){
  var n=Math.min(prods.length,14);
  document.getElementById('dots').innerHTML=Array.from({length:n},function(_,i){
    return '<div class="dot2'+(i===cur?' on':'')+'"></div>';
  }).join('');
}

// ════════════════════════════════════════════════════════════
//  TICKER
// ════════════════════════════════════════════════════════════
function buildTicker(){
  var items=[
    '📞 075 675 4168',
    '📞 076 556 1881',
    '📍 Kinniya, Trincomalee, Sri Lanka',
    '💬 WhatsApp us to order anytime!',
    '🛡️ Warranty on all products',
    '💻 Quality laptops – best prices',
    '🔧 Sales · Repairs · Accessories',
    '⭐ Visit ZIRO DEVICES today!'
  ];
  var d=items.concat(items);
  document.getElementById('ticker').innerHTML=d.map(function(t){
    return '<span class="t-item">'+t+'</span><span class="t-sep">◆</span>';
  }).join('');
}

// ════════════════════════════════════════════════════════════
//  SLIDESHOW
// ════════════════════════════════════════════════════════════
function next(){cur=(cur+1)%prods.length;renderSlide(cur);}
function startShow(){clearInterval(stimer);renderSlide(cur);stimer=setInterval(next,TICK);}

// ════════════════════════════════════════════════════════════
//  SILENT REFRESH (every 60s, keeps current slide)
// ════════════════════════════════════════════════════════════
function silentRefresh(){
  fetchData().then(function(d){if(d&&d.length)prods=d;}).catch(function(){});
  resetWD();
}

// ════════════════════════════════════════════════════════════
//  BOOT  (retry loop with countdown)
// ════════════════════════════════════════════════════════════
async function boot(){
  resetWD(); buildTicker(); fit();

  for(var a=0;a<=MAXR;a++){
    showLoad(a>0?'RETRYING ('+a+'/'+MAXR+')…':'LOADING PRODUCTS…');
    try{
      var data=await fetchData();
      if(data&&data.length){
        prods=data;
        hideLoad();
        cur=0; startShow();
        setInterval(silentRefresh,REF);
        running=true;
        return;
      }
    }catch(e){console.warn('[BOOT]',a,e.message);}

    if(a<MAXR) await startCD(RBASE*Math.pow(2,a));
  }

  // All retries failed — show message and hard reload in 12s
  document.getElementById('omsg').textContent='⚠️ CANNOT REACH SERVER';
  document.getElementById('ocd').style.display='block';
  document.getElementById('ocd').textContent='Reloading in 12s…';
  setTimeout(function(){location.reload();},12000);
}

document.addEventListener('visibilitychange',function(){
  if(!document.hidden&&running) silentRefresh();
});
window.addEventListener('load', boot);
</script>
